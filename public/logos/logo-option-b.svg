<!-- 
  Fairhaven Property Group – Logo Option B
  Concept: Abstract geometric mark — ascending rectangular levels 
  (property boundary stacking / ascending value / portfolio tiers)
  paired with a clean wordmark
  Colors: Navy #1A3A52 + Gold #D4AF37
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none" role="img" aria-label="Fairhaven Property Group">

  <!-- Geometric mark: 3 ascending columns (ascending levels / rising property values) -->
  <!-- Column 1 — shortest -->
  <rect x="8" y="40" width="14" height="28" fill="#1A3A52"/>
  <!-- Column 2 — mid -->
  <rect x="26" y="28" width="14" height="40" fill="#1A3A52"/>
  <!-- Column 3 — tallest -->
  <rect x="44" y="12" width="14" height="56" fill="#1A3A52"/>

  <!-- Gold cap lines on each column top -->
  <rect x="8" y="40" width="14" height="2" fill="#D4AF37"/>
  <rect x="26" y="28" width="14" height="2" fill="#D4AF37"/>
  <rect x="44" y="12" width="14" height="2" fill="#D4AF37"/>

  <!-- Gold baseline -->
  <rect x="8" y="68" width="50" height="2" fill="#D4AF37"/>

  <!-- Wordmark -->
  <text x="74" y="36" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-weight="700" fill="#1A3A52" letter-spacing="0.5">FAIRHAVEN</text>
  <text x="74" y="56" font-family="Georgia, 'Times New Roman', serif" font-size="11.5" font-weight="400" fill="#1A3A52" letter-spacing="3">PROPERTY GROUP</text>
  <!-- Thin gold divider -->
  <rect x="74" y="39.5" width="230" height="0.75" fill="#D4AF37" opacity="0.5"/>
</svg>
